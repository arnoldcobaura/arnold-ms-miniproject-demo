# PASO 9: CONFIGURACIÓN DE LA APLICACIÓN

server:
  port: 8080

spring:
  application:
    name: arnold-ms-miniproject-demo
  
  # RONDA 2: Configuración de MongoDB
  data:
    mongodb:
      uri: mongodb://admin:admin123@localhost:27017/arnold_products?authSource=admin
      auto-index-creation: true

# RONDA 4a: OpenAPI/Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

# RONDA 4c: Logging estructurado
logging:
  level:
    root: INFO
    com.empresa: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/arnold-ms-miniproject-demo.log

# RONDA 4d: Métricas
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    rabbit:
      enabled: false
  metrics:
    export:
      prometheus:
        enabled: true

spring.devtools:
  restart:
    enabled: true

# RONDA 5a: RabbitMQ para eventos asíncronos
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

# RONDA 5c: Redis para caching
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 2000
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
