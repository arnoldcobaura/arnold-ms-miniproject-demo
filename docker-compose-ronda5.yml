version: '3.8'

# RONDA 5: Docker Compose para RabbitMQ y Redis

services:
  # MongoDB (ya existente desde RONDA 2)
  mongodb:
    image: mongo:7.0
    container_name: arnold-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: arnold_products
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - arnold-network

  # RabbitMQ (RONDA 5a)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: arnold-rabbitmq
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    networks:
      - arnold-network

  # Redis (RONDA 5c)
  redis:
    image: redis:7-alpine
    container_name: arnold-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - arnold-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Mongo Express (herramienta visual para MongoDB)
  mongo-express:
    image: mongo-express:latest
    container_name: arnold-mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - arnold-network

volumes:
  mongodb_data:
  rabbitmq_data:
  redis_data:

networks:
  arnold-network:
    driver: bridge
