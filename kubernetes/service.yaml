apiVersion: v1
kind: Service
metadata:
  name: arnold-products
  namespace: arnold-products
  labels:
    app: arnold-products
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  selector:
    app: arnold-products
---
# NodePort para acceso local en Kind
apiVersion: v1
kind: Service
metadata:
  name: arnold-products-nodeport
  namespace: arnold-products
  labels:
    app: arnold-products
spec:
  type: NodePort
  ports:
  - name: http
    port: 8080
    targetPort: http
    nodePort: 30080
    protocol: TCP
  selector:
    app: arnold-products
