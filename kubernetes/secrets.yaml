# RONDA 6d: AWS Secrets Manager Integration
# Este archivo es un template - NO usar en producción
# En producción, usar AWS Secrets Manager o Sealed Secrets

apiVersion: v1
kind: Secret
metadata:
  name: arnold-products-secrets
  namespace: arnold-products
type: Opaque
stringData:
  # MongoDB credentials
  MONGODB_USER: admin
  MONGODB_PASSWORD: admin123
  
  # RabbitMQ credentials
  RABBITMQ_USER: guest
  RABBITMQ_PASSWORD: guest
  
  # AWS Secrets Manager (cuando se implemente)
  AWS_REGION: us-east-1
  AWS_SECRETS_MANAGER_ENABLED: "true"

---
# ServiceAccount para IRSA (IAM Roles for Service Accounts)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: arnold-products-sa
  namespace: arnold-products
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/arnold-products-role

---
# RoleBinding para acceso a secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: arnold-products-role
  namespace: arnold-products
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: arnold-products-rolebinding
  namespace: arnold-products
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: arnold-products-role
subjects:
- kind: ServiceAccount
  name: arnold-products-sa
  namespace: arnold-products
